// Demo campaign for KerbalCampaignKit.
// Shows chapters, triggers, reputation income, and notifications.

CAMPAIGN_CHAPTER
{
    id = 1
    name = First Steps
    description = Your space program is just getting off the ground.
    ENTRY_TRIGGER = demo_chapter_1_entry
}

CAMPAIGN_CHAPTER
{
    id = 2
    name = Into Orbit
    description = You are ready to reach Kerbin orbit.
    ENTRY_TRIGGER = demo_chapter_2_entry
}

CAMPAIGN_TRIGGER
{
    id = demo_chapter_1_entry
    once = true
    ON_EVENT
    {
        type = FacilityEntered
        facility = SpaceCenter
    }
    ACTIONS
    {
        ADVANCE_CHAPTER
        {
            target = 1
        }
        NOTIFY
        {
            target = admin
            severity = Info
            source = demo_welcome
        }
    }
}

CAMPAIGN_TRIGGER
{
    id = demo_chapter_2_entry
    once = true
    ON_EVENT
    {
        type = VesselOrbit
        body = Kerbin
    }
    ACTIONS
    {
        ADVANCE_CHAPTER
        {
            target = 2
        }
        NOTIFY
        {
            target = admin
            severity = Success
            source = demo_orbit_reached
        }
    }
}

REPUTATION_INCOME
{
    enabled = true
    intervalDays = 30
    TIER
    {
        min = 0
        max = 100
        income = 5000
        label = Startup
    }
    TIER
    {
        min = 100
        max = 250
        income = 15000
        label = Established
    }
    TIER
    {
        min = 250
        max = 500
        income = 35000
        label = Respected
    }
    TIER
    {
        min = 500
        max = 9999
        income = 60000
        label = Prestigious
    }
}

REPUTATION_DECAY
{
    enabled = true
    ratePercentPerMonth = 1.5
    resetOnContractComplete = true
    tierFloors = true
}
